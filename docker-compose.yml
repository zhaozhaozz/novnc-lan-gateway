name: novnc-lan-gateway

services:
  novnc-lan-gateway:
    # Default to the published image so `docker compose up -d` pulls it.
    # `build:` is kept so `docker compose up -d --build` still builds locally
    # and tags the result with this same name.
    image: ghcr.io/zhaozhaozz/novnc-lan-gateway:latest
    build: .
    container_name: novnc-lan-gateway
    restart: unless-stopped
    ports:
      - "6080:6080"
    environment:
      VNC_TARGETS_FILE: /data/targets.json
      NOVNC_ROOT: /usr/share/novnc
      # Set both values to protect the portal with HTTP Basic auth.
      # APP_USERNAME: admin
      # APP_PASSWORD: change-me
    volumes:
      - novnc-lan-gateway-data:/data

volumes:
  novnc-lan-gateway-data:
