<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>noVNC LAN Gateway</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="auth-warning" class="auth-warning hidden" role="alert">
      ⚠ This portal is <strong>public</strong>: no login is required and anyone who can reach it can
      add targets and open VNC sessions. Set <code>APP_USERNAME</code> and <code>APP_PASSWORD</code> to require a login.
    </div>
    <main class="shell">
      <section class="masthead">
        <div>
          <h1>noVNC LAN Gateway</h1>
        </div>
      </section>

      <section class="layout">
        <form id="target-form" class="panel">
          <input type="hidden" id="target-id" />
          <div class="panel-heading">
            <h2 id="form-title">Add target</h2>
            <button id="cancel-edit" class="ghost hidden" type="button">Cancel</button>
          </div>

          <label>
            Name
            <input id="target-name" name="name" autocomplete="off" maxlength="80" required />
          </label>

          <label>
            Host or IP
            <input id="target-host" name="host" autocomplete="off" placeholder="192.168.1.20" maxlength="253" required />
          </label>

          <label>
            VNC port
            <input id="target-port" name="port" type="number" min="1" max="65535" value="5900" required />
          </label>

          <label>
            VNC password
            <input id="target-password" name="password" type="password" autocomplete="new-password" maxlength="256" />
          </label>

          <label id="clear-password-row" class="check-row hidden">
            <input id="clear-password" name="clear-password" type="checkbox" />
            <span>Clear saved password</span>
          </label>

          <label>
            Description
            <textarea id="target-description" name="description" maxlength="240" rows="3"></textarea>
          </label>

          <button class="primary" type="submit">Save target</button>
          <p id="form-message" class="message" role="status"></p>
        </form>

        <section class="panel targets-panel">
          <div class="panel-heading">
            <h2>Targets</h2>
            <button id="refresh-targets" class="ghost" type="button">Refresh</button>
          </div>
          <div id="targets" class="targets"></div>
        </section>
      </section>
    </main>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
